name: Deploy to Villa Social

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 161.35.35.41
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/villa-social

            echo "=== Fixing remote URL ==="
            git remote set-url origin git@github.com:YorkieB/villa-social.git

            echo "=== Trusting GitHub host key ==="
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
            chmod 600 ~/.ssh/known_hosts

            echo "=== Pulling latest code ==="
            GIT_SSH_COMMAND='ssh -o StrictHostKeyChecking=no' git pull origin main

            echo "=== Installing deps ==="
            npm install --legacy-peer-deps

            echo "=== Building ==="
            NODE_ENV=production npx next build

            echo "=== Restarting ==="
            pm2 restart villa-social

            echo "=== Done ==="
            pm2 show villa-social | grep status
